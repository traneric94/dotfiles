# vim: ft=tmux
# Catppuccin Mocha — matches ghostty + nvim theme

# Catppuccin Mocha palette reference:
#   base       #1e1e2e   surface0   #313244   surface2   #585b70
#   text       #cdd6f4   subtext1   #bac2de   subtext0   #a6adc8
#   overlay0   #6c7086   yellow     #f9e2af   pink       #f5c2e7

set -g mode-style "fg=#cdd6f4,bg=#313244"

set -g message-style "fg=#cdd6f4,bg=#313244,bold"
set -g message-command-style "fg=#cdd6f4,bg=#313244"

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cdd6f4"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#585b70,bg=#313244"

set -g status-bg "#1e1e2e"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#313244,bg=#cdd6f4,bold] #S #[fg=#cdd6f4,bg=#bac2de,nobold,nounderscore,noitalics]#[fg=#1e1e2e,bg=#bac2de,bold] #(whoami) #[fg=#bac2de,bg=#1e1e2e]"
set -g status-right "#[fg=#585b70,bg=#1e1e2e,nobold,nounderscore,noitalics]#[fg=#bac2de,bg=#585b70]#[fg=#6c7086,bg=#585b70,nobold,nounderscore,noitalics]#[fg=#bac2de,bg=#6c7086]#[fg=#bac2de,bg=#6c7086,nobold,nounderscore,noitalics]#[fg=#1e1e2e,bg=#bac2de,bold] #h "

setw -g window-status-activity-style "underscore,fg=#a6adc8,bg=#1e1e2e"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a6adc8,bg=#1e1e2e"
setw -g window-status-format '#[fg=#1e1e2e,bg=#1e1e2e]#[default] #I  #{b:pane_current_path} #[fg=#1e1e2e,bg=#1e1e2e,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#1e1e2e,bg=#cdd6f4]#[fg=#f9e2af,bg=#cdd6f4] #I #[fg=#cdd6f4,bg=#f9e2af] #{b:pane_current_path} #[fg=#f9e2af,bg=#1e1e2e,nobold]'
