# Session switcher with tail preview (replaces choose-tree)
bind-key s display-popup -E -w 80% -h 60% "tmux ls -F '#{session_name}' | fzf --height=100% --ansi --preview 'bash $HOME/codebase/dotfiles/scripts/tmux-session-preview.sh {}' --preview-window=right:80%:border-left --border=rounded --color='bg:#002b36,bg+:#073642,fg:#839496,fg+:#eee8d5,hl:#b58900,hl+:#b58900,border:#586e75,prompt:#b58900,pointer:#cb4b16,info:#586e75' --prompt='session > ' --pointer='▶' | xargs -r tmux switch-client -t"

# Display lazygit
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# tmux-resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# Key bindings for resurrect
bind-key C-s run-shell '~/.tmux/plugins/tmux-resurrect/scripts/save.sh'
bind-key C-r run-shell '~/.tmux/plugins/tmux-resurrect/scripts/restore.sh'

